name: "Run Dependencies Audit"

on:
  pull_request:
    branches:
      - production

jobs:
  audit:
    name: "check"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v3

      - name: "Setup Node.js"
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: "Install dependencies"
        run: |
          npm install

      - name: "Run npm audit"
        run: |
          npm audit --audit-level=moderate
