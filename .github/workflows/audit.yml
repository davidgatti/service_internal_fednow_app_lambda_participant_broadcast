# Scans production npm dependencies for known security vulnerabilities.
# Fails the PR if any dependency has a moderate or higher severity CVE.
#
# Compliance: PCI DSS 6.1 (identify vulnerabilities), PCI DSS 6.2 (patch known vulnerabilities),
# SOC 2 CC7 (system operations monitoring).

name: "Run Dependencies Audit"

on:
  pull_request:
    branches:
      - production

jobs:
  audit:
    name: "check"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: "Install dependencies"
        run: |
          npm ci

      - name: "Run npm audit"
        run: |
          npm audit --audit-level=moderate
