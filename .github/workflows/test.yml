# Executes the full Jest test suite with coverage reporting.
# Prevents regressions by verifying all existing functionality still works.
#
# Compliance: PCI DSS 6.3 (develop software securely), PCI DSS 6.4.5.3 (functionality testing),
# SOC 2 CC8 (change management).

name: "Run Tests"

on:
  pull_request:
    branches:
      - production

jobs:
  test:
    name: "check"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Setup Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: "Install dependencies"
        run: |
          npm ci

      - name: "Run Jest"
        run: |
          npx jest --ci --coverage
