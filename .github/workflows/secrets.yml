# Scans the full git history for accidentally committed secrets, API keys, and credentials.
# Uses gitleaks to detect patterns like AWS keys, tokens, and private keys.
#
# Compliance: PCI DSS 8.2 (credential management), SOC 2 CC6 (logical access controls).

name: "Run Secret Scanning"

# on:
#   pull_request:
#     branches:
#       - production

jobs:
  secrets:
    name: "check"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Scan for secrets"
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
